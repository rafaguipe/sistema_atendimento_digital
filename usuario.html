<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atendimento Saúde</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.status {
  margin-top: 10px;
  padding: 12px;
  border-radius: 6px;
  font-size: 14px;
}

.novo { background: #ffe5e5; }
.atendendo { background: #fff4cc; }
.finalizado { background: #e6ffe6; }

.msg {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🏥 Atendimento</h1>

<label>Nome</label>
<input id="nome" placeholder="Seu nome">

<label>Telefone</label>
<input id="telefone" placeholder="Seu telefone">

<label>Mensagem</label>
<textarea id="mensagem" placeholder="Descreva seu pedido"></textarea>

<button onclick="enviar()">Enviar Solicitação</button>

<div id="resposta" class="msg"></div>

<h2>Status do Atendimento</h2>
<div id="status"></div>

</div>

<script>
const API = "http://192.168.15.33:1880";

let telefoneAtual = null;

// 🔥 padroniza telefone
function limparTelefone(tel) {
  return tel.replace(/\D/g, '');
}

// 🔁 formata data
function formatarData(ts) {
  try {
    let d = typeof ts === "number" ? new Date(ts) : new Date(ts);
    return d.toLocaleString("pt-BR");
  } catch {
    return "";
  }
}

// 🔁 carregar telefone salvo
window.onload = () => {
  const telSalvo = localStorage.getItem("telefone");
  if (telSalvo) {
    telefoneAtual = telSalvo;
    document.getElementById("telefone").value = telSalvo;
    atualizarStatus();
  }
};

// 🚀 enviar solicitação
async function enviar() {
  const nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  const mensagem = document.getElementById("mensagem").value;

  telefone = limparTelefone(telefone);
  telefoneAtual = telefone;

  localStorage.setItem("telefone", telefone);

  const res = await fetch(API + "/whatsapp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ nome, telefone, mensagem })
  });

  const data = await res.json();

  const respostaDiv = document.getElementById("resposta");

  if (data.status === "erro") {
    respostaDiv.innerHTML = `
      ⚠️ ${data.mensagem}<br>
      Acompanhe seu atendimento abaixo 👇
    `;
    respostaDiv.style.color = "orange";
    atualizarStatus();
    return;
  }

  respostaDiv.innerHTML = "✅ Solicitação enviada com sucesso!";
  respostaDiv.style.color = "green";

  atualizarStatus();
}

// 🔄 atualizar status
async function atualizarStatus() {
  if (!telefoneAtual) return;

  const res = await fetch(API + "/abertos?telefone=" + telefoneAtual);
  const data = await res.json();

  const container = document.getElementById("status");
  container.innerHTML = "";

  if (!data.abertos || data.abertos.length === 0) {
    container.innerHTML = "<p>✅ Nenhum atendimento em aberto</p>";
    return;
  }

  data.abertos.forEach(item => {
    const div = document.createElement("div");
    div.className = "status " + item.status;

    // protocolo amigável (últimos 6 dígitos)
    const protocolo = item.id ? item.id.toString().slice(-6) : "-";

    div.innerHTML = `
      <b style="color:#3498db;">Protocolo:</b> ${protocolo}<br>
      <b>Data:</b> ${formatarData(item.data)}<br>
      <b>Status:</b> ${item.status}<br>
      <b>Mensagem:</b> ${item.mensagem}<br>
    `;

    container.appendChild(div);
  });
}

// 🔄 auto atualizar
setInterval(atualizarStatus, 5000);

</script>

</body>
</html>
